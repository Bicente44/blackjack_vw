plugins {
    id 'java'
	id 'application'
	id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
	mavenCentral()
}

javafx {
	version = "21"
	modules = ['javafx.controls', 'javafx.graphics', 'javafx.base']
}

application {
	mainClass = 'BjGame.Main'
}

run {
    standardInput = System.in
}

sourceSets {
    main {
        java.srcDirs = ['src']
    }
}

jar {
    manifest {
        attributes 'Main-Class': 'BjGame.Main'
    }
}
